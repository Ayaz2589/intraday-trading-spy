# PRESET: vwap50 — Experiment 005's winning config.
#
# low-risk preset (account=$25k, risk=0.05%, cap=100%) plus
# max_distance_from_vwap_pct widened from 0.25 to 0.50. Captured
# as a reusable preset, not promoted to default, because the
# sample is still one month of one regime and the optimum may
# not have been found yet (see EXPERIMENTS.md Experiment 005,
# next-experiment suggestions).
#
# Differs from config/config.yaml at:
#   - risk.max_risk_per_trade_pct: 0.1 -> 0.05
#   - strategy.vwap_pullback.max_distance_from_vwap_pct: 0.25 -> 0.50
#
# Benchmark on data/raw/spy_5m_2026-04-29_2026-05-28.csv
# (run 20260529-134428-421a5b44):
#   46 trades, 17 W / 25 L, 37.0% WR, +10.47 Total R, -8.06R Max DD,
#   PF 1.357. Highest-edge result recorded as of Experiment 005.

app:
  name: intraday-trade-spy
  timezone: America/New_York
  mode: backtest

market:
  symbol: SPY
  session_start: "09:30:00"
  session_end: "16:00:00"
  no_new_trades_after: "15:30:00"
  force_flat_time: "15:55:00"

data:
  timeframe: 5m
  csv_path: data/raw/spy_5m_sample.csv
  output_dir: data/backtests
  require_regular_session_only: true

strategy:
  enabled: true
  allowed_directions:
    - long
  enabled_setup: vwap_pullback_long
  opening_range:
    minutes: 15
  vwap_pullback:
    max_distance_from_vwap_pct: 0.50    # <-- preset override (was 0.25)
    stop:
      type: below_pullback_low
      buffer_pct: 0.05
    target:
      risk_reward: 2.0

risk:
  account_value: 25000.0
  max_risk_per_trade_pct: 0.05         # <-- preset override (was 0.1)
  max_daily_loss_pct: 2.0
  max_trades_per_day: 3
  max_consecutive_losses: 2
  cooldown_after_loss_minutes: 30
  max_position_value_pct: 100.0
  require_stop_loss: true
  require_take_profit: true
  allow_overnight_positions: false

broker:
  provider: paper
  live_auto_enabled: false
  fees_per_share: 0.0
  slippage_per_share: 0.0
