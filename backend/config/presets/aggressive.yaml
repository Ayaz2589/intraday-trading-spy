# PRESET: aggressive — bigger risk per trade, looser loss lockout,
# 3:1 R/R targets.
#
# Tests the hypothesis "what if I want bigger winners and tolerate
# longer loss streaks?" Expect the position cap to bind hard at
# this risk level (see EXPERIMENTS.md Experiment 002): the cap
# algebra requires stop_distance >= ($125 * entry) / cap, which
# is ~$2.63 on SPY @ $525 — much wider than the strategy's
# natural stops. So most signals will reject.
#
# Differs from config/config.yaml at:
#   - risk.max_risk_per_trade_pct: 0.1 -> 1.0
#   - risk.max_consecutive_losses: 2 -> 4
#   - strategy.vwap_pullback.target.risk_reward: 2.0 -> 3.0

app:
  name: intraday-trade-spy
  timezone: America/New_York
  mode: backtest

market:
  symbol: SPY
  session_start: "09:30:00"
  session_end: "16:00:00"
  no_new_trades_after: "15:30:00"
  force_flat_time: "15:55:00"

data:
  timeframe: 5m
  csv_path: data/raw/spy_5m_sample.csv
  output_dir: data/backtests
  require_regular_session_only: true

strategy:
  enabled: true
  allowed_directions:
    - long
  enabled_setup: vwap_pullback_long
  opening_range:
    minutes: 15
  vwap_pullback:
    max_distance_from_vwap_pct: 0.25
    stop:
      type: below_pullback_low
      buffer_pct: 0.05
    target:
      risk_reward: 3.0                # <-- preset override (was 2.0)

risk:
  account_value: 25000.0
  max_risk_per_trade_pct: 1.0         # <-- preset override (was 0.1)
  max_daily_loss_pct: 2.0
  max_trades_per_day: 3
  max_consecutive_losses: 4           # <-- preset override (was 2)
  cooldown_after_loss_minutes: 30
  max_position_value_pct: 100.0
  require_stop_loss: true
  require_take_profit: true
  allow_overnight_positions: false

broker:
  provider: paper
  live_auto_enabled: false
  fees_per_share: 0.0
  slippage_per_share: 0.0
