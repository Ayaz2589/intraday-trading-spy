app:
  name: intraday-trade-spy
  timezone: America/New_York
  mode: backtest

market:
  symbol: SPY
  session_start: "09:30:00"
  session_end: "16:00:00"
  no_new_trades_after: "15:30:00"
  force_flat_time: "15:55:00"

data:
  timeframe: 5m
  csv_path: data/raw/spy_5m_sample.csv
  output_dir: data/backtests
  require_regular_session_only: true
  # Feature 009: cross-source read precedence. When more than one source has a
  # bar for the same timestamp, the first listed source wins (one bar per
  # timestamp reaches the engine). Alpaca is the canonical multi-year series;
  # yfinance fills only the recent tail Alpaca's free IEX feed has not served.
  source_preference: [alpaca, yfinance]
  # A regime counts as "covered" when this fraction of its expected NYSE
  # trading sessions are present in the cache.
  regime_covered_threshold_pct: 90
  # Distinct market regimes the multi-year backfill must span. Used to compute
  # and display per-regime data coverage.
  regimes:
    - { name: "2020 volatility",    start: "2020-01-01", end: "2020-12-31" }
    - { name: "2021 bull",          start: "2021-01-01", end: "2021-12-31" }
    - { name: "2022 bear",          start: "2022-01-01", end: "2022-12-31" }
    - { name: "2023-24 chop/trend", start: "2023-01-01", end: "2024-12-31" }

strategy:
  enabled: true
  allowed_directions:
    - long
  enabled_setup: vwap_pullback_long
  opening_range:
    minutes: 15
  vwap_pullback:
    max_distance_from_vwap_pct: 0.25
    stop:
      type: below_pullback_low
      buffer_pct: 0.05
    target:
      risk_reward: 2.0

risk:
  account_value: 25000.0
  max_risk_per_trade_pct: 0.1
  max_daily_loss_pct: 2.0
  max_trades_per_day: 3
  max_consecutive_losses: 2
  cooldown_after_loss_minutes: 30
  # Feature 012: 4x intraday day-trading buying power (standard for a same-day
  # strategy). At 100% the risk-based position size exceeds the cap as soon as
  # risk is raised above ~0.1%, so signals never become trades (the "0-trade
  # wall"). 400 lets the strategy size up to a realistic intraday position while
  # the per-trade-risk and daily-loss vetoes still bind. See FR-011.
  max_position_value_pct: 400.0
  require_stop_loss: true
  require_take_profit: true
  allow_overnight_positions: false

broker:
  provider: paper
  live_auto_enabled: false
  # Feature 010 (honest backtest): costs are applied to every fill so PnL is
  # net. Alpaca equities are commission-free -> fees 0. Slippage is a fixed
  # adverse amount per share (one cent ~ half-to-full top-of-book SPY spread),
  # applied on both entry and exit. Set both to 0.0 for a zero-cost baseline.
  fees_per_share: 0.0
  slippage_per_share: 0.01

# Backtest metrics (Feature 010). Governs the risk-adjusted + significance
# figures so no magic numbers live in source.
metrics:
  # Annualization factor for daily-return Sharpe/Sortino (NYSE trading days).
  trading_days_per_year: 252
  # Risk-free rate used in Sharpe/Sortino (0 for an intraday, cash strategy).
  risk_free_rate: 0.0
  # Confidence level for the Wilson win-rate confidence interval.
  win_rate_ci_confidence: 0.95
  # Results with fewer trades than this are flagged as statistically noisy.
  low_confidence_trade_count: 30

# Cloud-push knobs (Feature 005). Used when --push-to-supabase is set.
cloud:
  # Seconds to wait for the strategies-registry health check before bailing out.
  health_check_timeout_s: 5.0
  # Retries are 0 in v1 — a failed push is reported; the operator re-invokes
  # the CLI for a fresh attempt. The atomic push_run() RPC means a retry can
  # safely target the same run_id without partial state in the cloud.
  push_retries: 0
  # Seconds budget for the full push_run RPC. Aligns with SC-007 (10k signals
  # in <60s).
  push_timeout_s: 60

# HTTP API (Feature 006). Used by the FastAPI app.
api:
  # Per-user cap on concurrent in-flight backtest runs.
  max_concurrent_runs_per_user: 5
  # Startup sweep transitions running rows older than this to failed.
  polling_status_max_age_minutes: 15
  # /healthz DB-reachability timeout.
  health_check_timeout_s: 5.0
  # Max connections in the shared direct-Postgres pool (Feature 013 perf fix —
  # the R8 aggregates reuse pooled connections instead of paying a ~1s TLS
  # handshake per request).
  db_pool_max_size: 4
  # CORS origins for development. Production overrides via the CORS_ALLOW_ORIGINS
  # env var (comma-separated). CORS_ALLOW_ORIGIN_REGEX matches Vercel previews.
  cors_allow_origins:
    - http://localhost:5173
    - http://localhost:5174
  cors_allow_methods: [GET, POST, DELETE, OPTIONS]
  cors_allow_headers: [Authorization, Content-Type]
  # Data-download endpoint configuration (Feature 006, clarification Q3).
  data_download:
    retry_attempts: 3
    retry_backoff_seconds: [1, 2, 4]
    max_concurrent_per_user: 3
  # Bulk historical backfill (Feature 009). window_days bounds each fetch
  # window (progress granularity); a stale 'running' job older than
  # stale_job_ttl_minutes no longer counts against the concurrency cap so a
  # crashed backfill can always be re-triggered.
  backfill:
    window_days: 30
    max_concurrent_per_user: 1
    stale_job_ttl_minutes: 60
    # Feature 013: how many recent backfill jobs the Data page's job-history
    # table shows (newest first). Older jobs stay stored, just not displayed.
    history_limit: 20

# Alpaca market data (Feature 009). Secrets come from env (ALPACA_API_KEY /
# ALPACA_SECRET_KEY), never here. Algo Trader Plus subscription → SIP
# (consolidated, all US exchanges) for faithful multi-year VWAP.
alpaca:
  feed: sip

# Validation engine (Feature 011, Phase 2). The methodology that distinguishes
# a real edge from fit-to-noise. All dates/thresholds live here (no magic
# numbers in source). The engine EVALUATES and REPORTS only — it never
# auto-selects a config (constitution II).
validation:
  # Train / validation / lockbox split. Lockbox is the most-recent slice, held
  # out and never touched until the one-shot test.
  split:
    train:      { start: "2018-01-01", end: "2022-12-31" }
    validation: { start: "2023-01-01", end: "2024-12-31" }
    lockbox:    { start: "2025-01-01", end: "2026-12-31" }
  # Walk-forward defaults (clarified): rolling 12-month train, 6-month step,
  # validating on the next 6-month window. mode: rolling | anchored.
  walk_forward:
    mode: rolling
    train_months: 12
    step_months: 6
    validation_months: 6
    # |OOS − IS| expectancy-R gap that paints a window "likely overfit".
    # Provisional — finalized in task T067.
    overfit_gap_warn: 0.10
  sensitivity:
    default_metric: expectancy_dollars
  # Significance is seeded so verdicts are reproducible.
  significance:
    bootstrap_iterations: 1000
    permutation_iterations: 1000
    confidence: 0.95
    alpha: 0.05
    seed: 20260603
  # Feature 015: Monte Carlo path-risk (seeded; one iterations knob drives
  # both the shuffle and bootstrap methods).
  monte_carlo:
    iterations: 2000
    seed: 20260604
    ruin_thresholds_pct: [5, 10, 20]
    horizon_trades: null  # null -> match the run's observed trade count
    max_cone_steps: 200
  # Feature 016: the pooled study gate (pre-registered lockbox precondition).
  # passed iff pooled expectancy-$ CI low (at 1 - alpha) > 0. Seeded.
  pooled_gate:
    alpha: 0.05
    seed: 20260605
  # Single fan-out guard: total planned evaluations (grid points × windows)
  # beyond which a study launch must be explicitly confirmed.
  max_evaluations_warn: 200

# Feature 016: advisory Claude narrative (insights). Strictly advisory —
# manual trigger only; the app is fully functional without an API key.
insights:
  claude:
    model: claude-opus-4-8
    max_tokens: 8000
    max_timeseries_windows: 200
  # Feature 018: config health verdict thresholds (FR-003 — published config
  # values, never code constants).
  health:
    min_windows: 6              # evidence floor — below this: insufficient_evidence
    recent_windows: 4           # the "recent" comparison window count
    degradation_margin_r: 0.02  # R-units margin before degrading fires
  # Feature 018: deterministic candidate-generation knobs.
  recommend:
    min_improvement_r: 0.01   # neighborhood/median improvement required to suggest
    min_shared_windows: 4     # matched windows needed for cross-config transfer
    max_candidates: 5         # ranked knob-delta candidates surfaced

# Data-retention policy (Feature 006, clarification Q5).
# DECLARED here; not enforced in this feature. Future feature or pg_cron job
# implements the actual pruning.
retention:
  failed_runs_days: 90
  audit_events_days: 30
  failed_downloads_days: 30

# Feature 019: automated strategy research (campaigns + research CLI).
# Stopping thresholds are published config, never code constants (FR-006).
research:
  default_budget: 6          # campaign trial budget when not specified at launch
  base_alpha: 0.05           # gate alpha at k=1; cycle bar level = 1 - alpha/k
  backfill_start: "2018-01-01"  # full-span auto-backfill start for an empty cache
