app:
  name: intraday-trade-spy
  timezone: America/New_York
  mode: backtest

market:
  symbol: SPY
  session_start: "09:30:00"
  session_end: "16:00:00"
  no_new_trades_after: "15:30:00"
  force_flat_time: "15:55:00"

data:
  timeframe: 5m
  csv_path: data/raw/spy_5m_sample.csv
  output_dir: data/backtests
  require_regular_session_only: true

strategy:
  enabled: true
  allowed_directions:
    - long
  enabled_setup: vwap_pullback_long
  opening_range:
    minutes: 15
  vwap_pullback:
    min_minutes_after_open: 15
    max_distance_from_vwap_pct: 0.25
    confirmation:
      require_close_above_prior_bar_high: true
      require_close_above_vwap: true
    stop:
      type: below_pullback_low
      buffer_pct: 0.05
    target:
      risk_reward: 2.0

risk:
  account_value: 25000.0
  max_risk_per_trade_pct: 0.1
  max_daily_loss_pct: 2.0
  max_trades_per_day: 3
  max_consecutive_losses: 2
  cooldown_after_loss_minutes: 30
  max_position_value_pct: 100.0
  require_stop_loss: true
  require_take_profit: true
  allow_overnight_positions: false

broker:
  provider: paper
  live_auto_enabled: false
  fees_per_share: 0.0
  slippage_per_share: 0.0

# Cloud-push knobs (Feature 005). Used when --push-to-supabase is set.
cloud:
  # Seconds to wait for the strategies-registry health check before bailing out.
  health_check_timeout_s: 5.0
  # Retries are 0 in v1 — a failed push is reported; the operator re-invokes
  # the CLI for a fresh attempt. The atomic push_run() RPC means a retry can
  # safely target the same run_id without partial state in the cloud.
  push_retries: 0
  # Seconds budget for the full push_run RPC. Aligns with SC-007 (10k signals
  # in <60s).
  push_timeout_s: 60

# HTTP API (Feature 006). Used by the FastAPI app.
api:
  # Per-user cap on concurrent in-flight backtest runs.
  max_concurrent_runs_per_user: 5
  # Startup sweep transitions running rows older than this to failed.
  polling_status_max_age_minutes: 15
  # /healthz DB-reachability timeout.
  health_check_timeout_s: 5.0
  # CORS origins for development. Production overrides via the CORS_ALLOW_ORIGINS
  # env var (comma-separated). CORS_ALLOW_ORIGIN_REGEX matches Vercel previews.
  cors_allow_origins:
    - http://localhost:5173
    - http://localhost:5174
  cors_allow_methods: [GET, POST, DELETE, OPTIONS]
  cors_allow_headers: [Authorization, Content-Type]
  # Data-download endpoint configuration (Feature 006, clarification Q3).
  data_download:
    retry_attempts: 3
    retry_backoff_seconds: [1, 2, 4]
    max_concurrent_per_user: 3

# Data-retention policy (Feature 006, clarification Q5).
# DECLARED here; not enforced in this feature. Future feature or pg_cron job
# implements the actual pruning.
retention:
  failed_runs_days: 90
  audit_events_days: 30
  failed_downloads_days: 30
