[project]
name = "intraday-trade-spy"
version = "0.1.0"
description = "SPY-only intraday backtester + (later) paper trader"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.6",
    "pyyaml>=6.0",
    "pandas>=2.2",
    "python-dateutil>=2.9",
    "yfinance>=0.2.40",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "freezegun>=1.5",
    "ruff>=0.5",
]

[project.scripts]
intraday-trade-spy-backtest = "intraday_trade_spy.cli.run_backtest:main"
intraday-trade-spy-download = "intraday_trade_spy.cli.download_spy_data:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.pytest.ini_options]
addopts = "-ra --strict-markers"
testpaths = ["tests"]
markers = [
    "slow: opt-in tests that hit the real yfinance API (deselect with -m 'not slow')",
]
